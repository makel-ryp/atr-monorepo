[build]
builder = "nixpacks"
buildCommand = "bun install && bun run build"

[build.nixpacksPlan.variables]
NODE_VERSION = "22"
BUN_VERSION = "1.2.15"

[deploy]
startCommand = "bun .output/server/index.mjs"
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
